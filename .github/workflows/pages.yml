name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let the workflow's token enable Pages and publish the site (no manual setup needed).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (and enable it on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (the whole repo — index.html is at the root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
